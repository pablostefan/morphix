name: DS Preview

on:
  push:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      REPO_NAME: morphix
      REPO_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve branch slug
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          BRANCH_SLUG="$(echo "${BRANCH_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> "$GITHUB_ENV"
          echo "BRANCH_SLUG=${BRANCH_SLUG}" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: |
          cd morphix_ds_catalog
          flutter pub get

      - name: Validate registry
        run: |
          cd morphix_ds_catalog
          dart run tool/validate_registry.dart

      - name: Run tests
        run: |
          cd morphix_ds_catalog
          flutter test

      - name: Build web
        run: |
          cd morphix_ds_catalog
          flutter build web --release --base-href "/${REPO_NAME}/${BRANCH_SLUG}/"

      - name: Create component redirect pages
        run: |
          cd morphix_ds_catalog
          while IFS= read -r component_id; do
            if [ -z "${component_id}" ]; then
              continue
            fi
            mkdir -p "build/web/${component_id}"
            cat > "build/web/${component_id}/index.html" <<EOF
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>${component_id}</title>
  <script>
    window.location.replace('../?component=${component_id}');
  </script>
</head>
<body></body>
</html>
EOF
          done < tool/component_ids.txt

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./morphix_ds_catalog/build/web
          destination_dir: ${{ env.BRANCH_SLUG }}

      - name: Output links
        run: |
          echo "Branch preview: https://${REPO_OWNER}.github.io/${REPO_NAME}/${BRANCH_SLUG}/" >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r component_id; do
            if [ -z "${component_id}" ]; then
              continue
            fi
            echo "- https://${REPO_OWNER}.github.io/${REPO_NAME}/${BRANCH_SLUG}/${component_id}" >> "$GITHUB_STEP_SUMMARY"
          done < morphix_ds_catalog/tool/component_ids.txt
