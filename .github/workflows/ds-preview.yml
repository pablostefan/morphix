name: DS Preview

on:
  push:
    paths:
      - '.github/workflows/ds-preview.yml'
      - '.github/ds-preview-paths.txt'
      - 'morphix_design_system/**'
      - 'morphix_ds_catalog/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/ds-preview.yml'
      - '.github/ds-preview-paths.txt'
      - 'morphix_design_system/**'
      - 'morphix_ds_catalog/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-relevant-changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.should_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve diff range
        id: diff-range
        run: |
          if [[ "${{ github.event_name }}" == 'pull_request' ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" == '0000000000000000000000000000000000000000' ]]; then
            BASE_SHA=''
          fi

          echo "BASE_SHA=${BASE_SHA}" >> "$GITHUB_ENV"
          echo "HEAD_SHA=${HEAD_SHA}" >> "$GITHUB_ENV"

      - name: Filter relevant paths
        id: filter
        run: |
          SHOULD_RUN='false'
          MATCHED_FILES=''
          MATCHED_PATTERNS=''

          if [[ -n "${BASE_SHA}" ]]; then
            CHANGED_FILES="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          else
            CHANGED_FILES="$(git show --pretty='' --name-only "${HEAD_SHA}")"
          fi

          while IFS= read -r changed_file; do
            [[ -z "${changed_file}" ]] && continue

            while IFS= read -r raw_pattern; do
              pattern="${raw_pattern#${raw_pattern%%[![:space:]]*}}"
              pattern="${pattern%${pattern##*[![:space:]]}}"

              [[ -z "${pattern}" ]] && continue
              [[ "${pattern}" == \#* ]] && continue

              if [[ "${changed_file}" == ${pattern} ]]; then
                SHOULD_RUN='true'
                MATCHED_FILES+="${changed_file}"$'\n'
                MATCHED_PATTERNS+="${pattern}"$'\n'
                break
              fi
            done < .github/ds-preview-paths.txt
          done <<< "${CHANGED_FILES}"

          {
            echo "should_run=${SHOULD_RUN}"
            echo 'changed_files<<EOF'
            echo "${CHANGED_FILES}"
            echo 'EOF'
            echo 'matched_files<<EOF'
            printf '%s' "${MATCHED_FILES}" | sort -u
            echo
            echo 'EOF'
            echo 'matched_patterns<<EOF'
            printf '%s' "${MATCHED_PATTERNS}" | sort -u
            echo
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "should_run: ${{ steps.filter.outputs.should_run }}" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo 'Changed files:' >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.filter.outputs.changed_files }}' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo 'Matched paths:' >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.filter.outputs.matched_patterns }}' >> "$GITHUB_STEP_SUMMARY"

  publish:
    needs: detect-relevant-changes
    if: github.event_name == 'push' && needs.detect-relevant-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve branch slug
        id: branch
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          BRANCH_SLUG="$(echo "${BRANCH_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
          PREVIEW_VERSION="${GITHUB_SHA::12}"
          echo "BRANCH_SLUG=${BRANCH_SLUG}" >> "$GITHUB_ENV"
          echo "PREVIEW_VERSION=${PREVIEW_VERSION}" >> "$GITHUB_ENV"
          echo "branch_slug=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
          echo "preview_version=${PREVIEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: |
          cd morphix_ds_catalog
          flutter pub get

      - name: Validate registry
        run: |
          cd morphix_ds_catalog
          dart run tool/validate_registry.dart

      - name: Run tests
        run: |
          cd morphix_ds_catalog
          flutter test

      - name: Build web
        run: |
          cd morphix_ds_catalog
          flutter build web --release --pwa-strategy=none --base-href "/morphix/${BRANCH_SLUG}/"

      - name: Patch web assets cache-busting
        run: |
          cd morphix_ds_catalog
          sed -i "s#main.dart.js#main.dart.js?v=${PREVIEW_VERSION}#g" build/web/flutter_bootstrap.js
          sed -i "s#main.dart.js#main.dart.js?v=${PREVIEW_VERSION}#g" build/web/index.html

      - name: Create component redirect pages
        run: |
          cd morphix_ds_catalog
          while IFS= read -r component_id; do
            [[ -z "${component_id}" ]] && continue
            mkdir -p "build/web/${component_id}"
            printf '%s\n' \
              '<!doctype html>' \
              '<html>' \
              '<head>' \
              '  <meta charset="utf-8">' \
              '  <meta name="viewport" content="width=device-width, initial-scale=1">' \
              "  <title>${component_id}</title>" \
              '  <script>' \
              "    window.location.replace('../?component=${component_id}&v=${PREVIEW_VERSION}');" \
              '  </script>' \
              '</head>' \
              '<body></body>' \
              '</html>' \
              > "build/web/${component_id}/index.html"
          done < tool/component_ids.txt

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./morphix_ds_catalog/build/web
          destination_dir: ${{ steps.branch.outputs.branch_slug }}

      - name: Output links
        run: |
          echo "Branch preview: https://pablostefan.github.io/morphix/${BRANCH_SLUG}/?v=${PREVIEW_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r component_id; do
            [[ -z "${component_id}" ]] && continue
            echo "- https://pablostefan.github.io/morphix/${BRANCH_SLUG}/${component_id}?v=${PREVIEW_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          done < morphix_ds_catalog/tool/component_ids.txt

  pr-compare-links:
    needs: detect-relevant-changes
    if: github.event_name == 'pull_request' && needs.detect-relevant-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR context
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          BASE_SLUG="$(echo "${BASE_REF}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
          HEAD_SLUG="$(echo "${HEAD_REF}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"

          echo "BASE_REF=${BASE_REF}" >> "$GITHUB_ENV"
          echo "HEAD_REF=${HEAD_REF}" >> "$GITHUB_ENV"
          echo "BASE_SHA=${BASE_SHA}" >> "$GITHUB_ENV"
          echo "HEAD_SHA=${HEAD_SHA}" >> "$GITHUB_ENV"
          echo "BASE_SLUG=${BASE_SLUG}" >> "$GITHUB_ENV"
          echo "HEAD_SLUG=${HEAD_SLUG}" >> "$GITHUB_ENV"
          echo "BASE_VERSION=${BASE_SHA::12}" >> "$GITHUB_ENV"
          echo "HEAD_VERSION=${HEAD_SHA::12}" >> "$GITHUB_ENV"

      - name: Detect changed component IDs
        run: |
          CHANGED_FILES="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"

          declare -A IDS
          while IFS= read -r file; do
            [[ -z "${file}" ]] && continue

            if [[ "${file}" =~ ^morphix_ds_catalog/lib/src/components/(.+)_preview\.dart$ ]]; then
              IDS["${BASH_REMATCH[1]}"]=1
              continue
            fi

            if [[ "${file}" =~ ^morphix_design_system/lib/src/widgets/(.+)\.dart$ ]]; then
              IDS["${BASH_REMATCH[1]}"]=1
              continue
            fi
          done <<< "${CHANGED_FILES}"

          if [[ ${#IDS[@]} -eq 0 ]]; then
            while IFS= read -r component_id; do
              [[ -z "${component_id}" ]] && continue
              IDS["${component_id}"]=1
            done < morphix_ds_catalog/tool/component_ids.txt
          fi

          SORTED_IDS="$(printf '%s\n' "${!IDS[@]}" | sort | uniq)"

          {
            echo "CHANGED_COMPONENT_IDS<<EOF"
            echo "${SORTED_IDS}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Build PR comment body
        run: |
          COMMENT_FILE=pr-compare-comment.md
          {
            echo '<!-- morphix-pr-compare -->'
            echo '## Morphix Component Compare'
            echo
            echo "Base branch: ${BASE_REF}"
            echo "Head branch: ${HEAD_REF}"
            echo
            echo 'Componentes alterados nesta PR:'
          } > "$COMMENT_FILE"

          while IFS= read -r component_id; do
            [[ -z "${component_id}" ]] && continue
            COMPARE_URL="https://pablostefan.github.io/morphix/${HEAD_SLUG}/?compare=1&component=${component_id}&base=${BASE_SLUG}&head=${HEAD_SLUG}&vbase=${BASE_VERSION}&vhead=${HEAD_VERSION}"
            BASE_URL="https://pablostefan.github.io/morphix/${BASE_SLUG}/${component_id}?v=${BASE_VERSION}"
            HEAD_URL="https://pablostefan.github.io/morphix/${HEAD_SLUG}/${component_id}?v=${HEAD_VERSION}"

            {
              echo "- **${component_id}**"
              echo "  - Compare: ${COMPARE_URL}"
              echo "  - Base: ${BASE_URL}"
              echo "  - Head: ${HEAD_URL}"
            } >> "$COMMENT_FILE"
          done <<< "${CHANGED_COMPONENT_IDS}"

          {
            echo
            echo "PR run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$COMMENT_FILE"

      - name: Create or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- morphix-pr-compare -->';
            const body = fs.readFileSync('pr-compare-comment.md', 'utf8');

            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
