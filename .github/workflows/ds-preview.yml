name: DS Preview

on:
  push:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve branch slug
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          BRANCH_SLUG="$(echo "${BRANCH_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
          PREVIEW_VERSION="${GITHUB_SHA::12}"
          echo "BRANCH_SLUG=${BRANCH_SLUG}" >> "$GITHUB_ENV"
          echo "PREVIEW_VERSION=${PREVIEW_VERSION}" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: |
          cd morphix_ds_catalog
          flutter pub get

      - name: Validate registry
        run: |
          cd morphix_ds_catalog
          dart run tool/validate_registry.dart

      - name: Run tests
        run: |
          cd morphix_ds_catalog
          flutter test

      - name: Build web
        run: |
          cd morphix_ds_catalog
          flutter build web --release --pwa-strategy=none --base-href "/morphix/${BRANCH_SLUG}/"

      - name: Create ds_button redirect page
        run: |
          cd morphix_ds_catalog
          mkdir -p build/web/ds_button
          printf '%s\n' \
            '<!doctype html>' \
            '<html>' \
            '<head>' \
            '  <meta charset="utf-8">' \
            '  <meta name="viewport" content="width=device-width, initial-scale=1">' \
            '  <title>ds_button</title>' \
            '  <script>' \
            "    window.location.replace('../?component=ds_button&v=${PREVIEW_VERSION}');" \
            '  </script>' \
            '</head>' \
            '<body></body>' \
            '</html>' \
            > build/web/ds_button/index.html

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./morphix_ds_catalog/build/web
          destination_dir: ${{ env.BRANCH_SLUG }}

      - name: Output links
        run: |
          echo "Branch preview: https://pablostefan.github.io/morphix/${BRANCH_SLUG}/?v=${PREVIEW_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- https://pablostefan.github.io/morphix/${BRANCH_SLUG}/ds_button?v=${PREVIEW_VERSION}" >> "$GITHUB_STEP_SUMMARY"
